---
layout: default
---
<article class="post-article">
  <header class="post-header">
    <div class="post-kicker">Pico log entry</div>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">Logged on {{ page.date | date: "%Y-%m-%d" }} by {{ site.author }}.</p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
